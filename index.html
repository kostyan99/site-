<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Future | Interactive Experience</title>
    <style>
        /* --- 1. Сброс и Базовые стили --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Скрываем скроллбары для эффекта приложения */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #050505;
            color: white;
        }

        /* --- 2. Фон (Canvas) --- */
        #canvas-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Помещаем за контентом */
        }

        /* --- 3. Основной Контейнер --- */
        .container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            z-index: 1;
        }

        /* --- 4. Карточка Контента (Glassmorphism) --- */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            
            /* Анимация появления */
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease-out forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- 5. Типографика и Эффекты --- */
        h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #00f260, #0575e6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
            
            /* Анимация текста */
            animation: glow 3s infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 5px rgba(0, 242, 96, 0.3)); }
            to { filter: drop-shadow(0 0 15px rgba(5, 117, 230, 0.8)); }
        }

        p {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        /* --- 6. Кнопка с анимацией --- */
        .btn {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            background: transparent;
            border: 2px solid #00f260;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #00f260;
            color: #000;
            box-shadow: 0 0 20px #00f260, 0 0 40px #0575e6;
            transform: scale(1.05);
        }

        /* --- 7. Декоративные элементы (Свечение) --- */
        .glow-spot {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
        }

        .spot-1 { top: 10%; left: 20%; background: #ff00cc; animation: float 6s ease-in-out infinite; }
        .spot-2 { bottom: 15%; right: 20%; background: #333399; animation: float 8s ease-in-out infinite reverse; }

        @keyframes float {
            0% { transform: translate(0, 0); }
            50% { transform: translate(20px, -40px); }
            100% { transform: translate(0, 0); }
        }

    </style>
</head>
<body>

    <!-- Фон с анимацией частиц -->
    <canvas id="canvas-bg"></canvas>

    <!-- Декоративные пятна света -->
    <div class="glow-spot spot-1"></div>
    <div class="glow-spot spot-2"></div>

    <!-- Основной контент -->
    <div class="container">
        <div class="card">
            <h1>CYBER AESTHETICS</h1>
            <p>Добро пожаловать в будущее. Интерактивная среда, созданная с использованием HTML5 Canvas и CSS3 анимаций.</p>
            <button class="btn" onclick="triggerEffect()">Нажми меня</button>
        </div>
    </div>

    <script>
        /**
         * Логика Анимации Частиц (Canvas)
         */
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');

        let particlesArray;
        
        // Настройка размеров Canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });
        resizeCanvas();

        // Класс Частицы
        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
            }

            // Отрисовка одной частицы
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = '#00f260'; // Основной цвет точек
                ctx.fill();
            }

            // Обновление позиции (движение)
            update() {
                if (this.x > canvas.width || this.x < 0) {
                    this.directionX = -this.directionX;
                }
                if (this.y > canvas.height || this.y < 0) {
                    this.directionY = -this.directionY;
                }

                // Движение
                this.x += this.directionX;
                this.y += this.directionY;

                this.draw();
            }
        }

        // Инициализация массива частиц
        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 9000; // Плотность зависит от размера экрана
            
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                
                // Случайная скорость
                let directionX = (Math.random() * 1) - 0.5; 
                let directionY = (Math.random() * 1) - 0.5;
                
                particlesArray.push(new Particle(x, y, directionX, directionY, size, '#00f260'));
            }
        }

        // Анимационный цикл
        function animateParticles() {
            requestAnimationFrame(animateParticles);
            ctx.clearRect(0, 0, innerWidth, innerHeight);

            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            
            connectParticles(); // Рисуем линии между близкими точками
        }

        // Логика соединения точек линиями
        function connectParticles() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x)) + 
                                   ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    
                    if (distance < (canvas.width/7) * (canvas.height/7)) {
                        opacityValue = 1 - (distance / 20000);
                        ctx.strokeStyle = 'rgba(5, 117, 230,' + opacityValue + ')'; // Синие линии
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // Запуск анимации
        initParticles();
        animateParticles();

        /**
         * Интерактивность: Эффект при нажатии кнопки
         */
        function triggerEffect() {
            const btn = document.querySelector('.btn');
            const card = document.querySelector('.card');
            
            // Вращение карточки
            let rotate = 0;
            let interval = setInterval(() => {
                rotate += 10;
                card.style.transform = `rotate(${rotate}deg)`;
                
                if (rotate > 360) {
                    clearInterval(interval);
                    // Сброс через CSS transition
                    setTimeout(() => {
                        card.style.transition = 'transform 2s ease';
                        card.style.transform = 'rotate(0deg) scale(1.1)';
                        setTimeout(() => {
                            card.style.transition = ''; // Убираем переход для следующего клика
                            card.style.transform = 'rotate(0deg) scale(1)';
                        }, 2000);
                    }, 50);
                }
            }, 30);

            // Взрыв частиц в центре (простая имитация)
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            for(let i=0; i<100; i++) {
                createExplosion(centerX, centerY);
            }
        }

        function createExplosion(x, y) {
            // Создаем временные частицы для взрыва
            const explosionParticle = new Particle(
                x + (Math.random() - 0.5) * 100, 
                y + (Math.random() - 0.5) * 100, 
                (Math.random() - 0.5) * 10, // Быстрое движение
                (Math.random() - 0.5) * 10,
                Math.random() * 3,
                '#ff00cc' // Розовый цвет для взрыва
            );
            
            // Рисуем один раз и удаляем
            explosionParticle.draw();
        }

    </script>
</body>
</html>
