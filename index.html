<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Visual Experience</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505; /* Глубокий черный фон */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-size: 1.2rem;
            background: linear-gradient(90deg, #ff00cc, #3333ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 0.8rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="overlay">
        <h1>Neural Flow System</h1>
        <p>Двигайте мышью, чтобы взаимодействовать с полем частиц</p>
    </div>

    <canvas id="canvas"></canvas>

<script>
/**
 * Data Structures & Invariants:
 * 1. Particle Class: Represents a single point of light with physics properties (velocity, friction).
 * 2. Wave System: Manages the interference patterns between particles.
 * 
 * Precondition: Canvas API is supported by the browser.
 * Postcondition: A high-performance particle simulation runs at ~60fps.
 */

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false }); // Optimize for no transparency on base canvas

let width, height;
let particles = [];
let mouse = { x: -1000, y: -1000 };
let hueOffset = 0;

// Configuration constants for visual complexity vs performance balance
const PARTICLE_COUNT = 250; 
const CONNECTION_DISTANCE = 120;
const MOUSE_RADIUS = 200;

class Particle {
    constructor() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        // Random velocity vector with slight bias towards center for "gravity" feel
        this.vx = (Math.random() - 0.5) * 1.5; 
        this.vy = (Math.random() - 0.5) * 1.5;
        
        this.size = Math.random() * 2 + 1;
        // Base color is cyan/blue, modified by hueOffset over time
        this.baseHue = 180 + Math.random() * 60; 
    }

    update() {
        // Physics: Move
        this.x += this.vx;
        this.y += this.vy;

        // Friction/Damping (slows down movement slightly over time)
        this.vx *= 0.985;
        this.vy *= 0.985;

        // Mouse Interaction: Repulsion/Attraction logic
        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < MOUSE_RADIUS) {
            const forceDirectionX = dx / distance;
            const forceDirectionY = dy / distance;
            
            // Calculate repulsion strength based on proximity
            const force = (MOUSE_RADIUS - distance) / MOUSE_RADIUS;
            const directionX = forceDirectionX * force * 3; 
            const directionY = forceDirectionY * force * 3;

            this.vx -= directionX;
            this.vy -= directionY;
        }

        // Boundary Wrapping (Infinite canvas feel)
        if (this.x < 0) this.x += width;
        else if (this.x > width) this.x -= width;
        
        if (this.y < 0) this.y += height;
        else if (this.y > height) this.y -= height;

        // Add subtle noise to velocity for organic movement
        this.vx += (Math.random() - 0.5) * 0.1;
        this.vy += (Math.random() - 0.5) * 0.1;
    }

    draw(ctx, time) {
        // Dynamic coloring based on velocity and global hue cycle
        const speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
        const colorHue = (this.baseHue + speed * 20 + time / 50) % 360;
        
        ctx.fillStyle = `hsla(${colorHue}, 80%, 60%, ${Math.min(1, this.size)})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * (speed + 0.5), 0, Math.PI * 2);
        ctx.fill();
    }
}

function init() {
    resize();
    
    // Create particles with staggered initialization for better distribution
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push(new Particle());
    }
}

function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    
    // Clear background with a slight fade effect for trails (optional, but we use solid clear here for performance)
    ctx.fillStyle = '#050505'; 
    ctx.fillRect(0, 0, width, height);
}

function animate(time) {
    requestAnimationFrame(animate);

    // Clear screen with a very slight opacity to create motion trails (optional optimization: skip this for max FPS)
    // Using solid clear here for maximum performance as requested.
    ctx.clearRect(0, 0, width, height);

    hueOffset += 0.2; // Slowly cycle global colors

    // Update and draw particles
    particles.forEach(p => {
        p.update();
        p.draw(ctx, time);
    });

    // Draw Connections (The "Neural" part)
    ctx.lineWidth = 0.5;
    
    for (let i = 0; i < particles.length; i++) {
        const p1 = particles[i];
        
        // Optimization: Only check connections with nearby particles to save CPU
        // This is a simplified O(N^2) approach, but heavily pruned by distance checks
        
        for (let j = i + 1; j < particles.length; j++) {
            const p2 = particles[j];
            
            const dx = p1.x - p2.x;
            const dy = p1.y - p2.y;
            const distSq = dx*dx + dy*dy;

            if (distSq < CONNECTION_DISTANCE * CONNECTION_DISTANCE) {
                // Calculate opacity based on distance
                const opacity = 1 - Math.sqrt(distSq) / CONNECTION_DISTANCE;
                
                ctx.strokeStyle = `hsla(${hueOffset}, 70%, 50%, ${opacity})`;
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.stroke();
            }
        }
    }
}

// Event Listeners
window.addEventListener('resize', resize);
window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});
window.addEventListener('touchmove', (e) => {
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
}, { passive: false });

// Start
init();
animate(0);

</script>
</body>
</html>
